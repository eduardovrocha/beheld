name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-ts:
    name: TypeScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install engine with dev dependencies
        run: pip install -e "packages/engine[dev]"

      - name: Run tests
        run: pytest packages/engine/tests -v

  build-check:
    name: Build check (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build CLI binary
        run: bun build packages/cli/src/index.ts --compile --outfile dist/devprofile

      - name: Smoke test
        run: dist/devprofile --version
